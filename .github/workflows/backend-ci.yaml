name: DevInsight Hub Backend CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  id-token: write   # Required for Workload Identity

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]   # updated versions

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4     # v3 → v4

      # Step 2: Setup Node.js
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4   # v3 → v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'  # ch5/backend → backend

      - name: Install dependencies
        working-directory: backend    # ch5/backend → backend
        run: npm install

      - name: Run linter on backend
        working-directory: backend
        run: npm run lint

      - name: Run tests on backend
        working-directory: backend
        run: npm test --passWithNoTests  # won't fail if no tests yet

  # ─── CD: Build & Push to Artifact Registry ──────
  build-and-push-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4

      # Step 2: Authenticate to GCP (No JSON key!) 🔐
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Step 3: Setup gcloud
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: us-central1-docker.pkg.dev/project-f9557618-07f5-4e11-af8/devinsight-hub/backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Step 7: Build and Push to Artifact Registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v5   
        with:
          context: ./backend                
          file: ./backend/Dockerfile         
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}