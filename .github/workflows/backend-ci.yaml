name: DevInsight Hub Backend CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  # ─── CI: Lint & Test ────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ch5/backend/package-lock.json'

      - name: Install dependencies
        working-directory: ch5/backend
        run: npm install

      - name: Run linter on backend
        working-directory: ch5/backend
        run: npm run lint

      - name: Run tests on backend
        working-directory: ch5/backend
        run: npm test --passWithNoTests

  # ─── CD: Build & Push ───────────────────────────
  build-and-push-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Changed to asia-south1
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ✅ Changed to asia-south1
          images: asia-south1-docker.pkg.dev/project-f9557618-07f5-4e11-af8/devinsight-hub/backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ch5/backend
          file: ./ch5/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # # ✅ Deploy to Cloud Run in asia-south1
