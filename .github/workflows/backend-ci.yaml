name: Blog Backend CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Add permissions required for pushing to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

# Define the tasks (jobs) that GitHub Actions will run
jobs:
  lint-and-test:
    # Run the job on a clean, standard Linux virtual machine (Ubuntu)
    runs-on: ubuntu-latest

jobs:
  # ─── CI: Lint & Test ────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]   # updated versions

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4     # v3 → v4

      # Step 2: Setup Node.js
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4   # v3 → v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'  # ch5/backend → backend

      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: backend    # ch5/backend → backend
        run: npm install

      # Step 4: Run linter
      - name: Run linter on backend
        working-directory: backend
        run: npm run lint

      # Step 5: Run tests
      - name: Run tests on backend
        working-directory: ch5/backend
        run: npm run test

  build-and-push-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Run build & push to GHCR only on pushes to master branch (when PR is merged)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      # Step 1: Check out the repository code
      - uses: actions/checkout@v3

      # Step 2: Set up QEMU (for multi-platform builds if needed)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 4: Log in to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Extract metadata (tags, labels) for Docker image
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/blog-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Step 6: Build and Push Docker Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./ch5/backend
          file: ./ch5/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
