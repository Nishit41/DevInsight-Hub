name: Deploy DevInsight Hub

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: project-f9557618-07f5-4e11-af8
  REGION: asia-south1  # ✅ Changed from us-central1

jobs:
  # ─── CI: Frontend ───────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  # ─── CI: Backend ────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ch5/backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: ch5/backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  # ─── CD: Deploy ─────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    permissions:
      contents: read
      id-token: write

    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ✅ Changed to asia-south1
      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      # ✅ Changed registry to asia-south1
      - name: Build and Push Backend
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/backend:${{ github.sha }} ./backend
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/backend:${{ github.sha }}

      - id: deploy-backend
        name: Deploy Backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: devinsight-hub-backend
          image: asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/backend:${{ github.sha }}
          region: ${{ env.REGION }}

      # ✅ Added IAM for backend
      - name: Set IAM policy for Backend
        run: |
          gcloud run services add-iam-policy-binding devinsight-hub-backend \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"

      # ✅ Changed registry to asia-south1
      - name: Build and Push Frontend
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=${{ steps.deploy-backend.outputs.url }}/api \
            -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/frontend:${{ github.sha }} \
            ./frontend
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/frontend:${{ github.sha }}

      - id: deploy-frontend
        name: Deploy Frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: devinsight-hub-frontend
          image: asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/devinsight-hub/frontend:${{ github.sha }}
          region: ${{ env.REGION }}

      # ✅ Added IAM for frontend
      - name: Set IAM policy for Frontend
        run: |
          gcloud run services add-iam-policy-binding devinsight-hub-frontend \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"

      # ✅ Print both URLs
      - name: Print deployed URLs
        run: |
          echo "Frontend URL: ${{ steps.deploy-frontend.outputs.url }}"
          echo "Backend URL: ${{ steps.deploy-backend.outputs.url }}"